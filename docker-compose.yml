services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    expose:
      - "9090"
    deploy:
      replicas: 3
    networks:
      - proxy_net

  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - "9090:9090"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - proxy_net

networks:
  proxy_net:
    ipam:
      config:
        - subnet: 192.168.1.0/24
